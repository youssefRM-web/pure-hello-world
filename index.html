    <!-- Hide Cookiebot floating renew button -->
    <style>
      #CybotCookiebotDialogBodyUnderlay,
      #CybotCookiebotDialog {
        /* dialog itself — no scroll changes needed here */
      }
      /* Hide the small floating cookie renewal widget in the corner */
      #CookiebotWidget {
        display: none !important;
      }
    </style>
    <!-- Block background scroll while Cookiebot dialog is visible -->
    <script>
      (function () {
        function lockScroll() {
          document.documentElement.style.overflow = 'hidden';
          document.body.style.overflow = 'hidden';
        }
        function unlockScroll() {
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
        }
        window.addEventListener('CookiebotOnDialogDisplay', lockScroll);
        window.addEventListener('CookiebotOnAccept', unlockScroll);
        window.addEventListener('CookiebotOnDecline', unlockScroll);
        window.addEventListener('CookiebotOnTagsExecuted', unlockScroll);
        // Fallback: poll for dialog visibility
        var _poll = setInterval(function () {
          var dialog = document.getElementById('CybotCookiebotDialog');
          if (dialog) {
            var visible = dialog.style.display !== 'none' && dialog.offsetParent !== null;
            if (visible) { lockScroll(); } else { unlockScroll(); }
          }
        }, 300);
        // Stop polling after 30 s
        setTimeout(function () { clearInterval(_poll); }, 30000);
      })();
    </script>
